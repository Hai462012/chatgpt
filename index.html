<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat by DevHai (Powered by Groq)</title>
    <style>
        /* CSS Giao diện hiện đại */
        :root {
            --bg-color: #212121;
            --chat-bg: #2f2f2f;
            --text-color: #ececec;
            --user-bubble: #424242;
            --ai-bubble: #171717;
            --accent: #f55036; /* Đổi màu nhấn sang cam đỏ phong cách Groq */
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
        }

        header {
            background-color: var(--chat-bg);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #444;
        }

        header strong {
            font-size: 1.2rem;
            color: var(--accent);
        }

        header button {
            background-color: #444; color: white;
            border: 1px solid #555; padding: 8px 15px;
            border-radius: 5px; cursor: pointer;
        }
        header button:hover { background-color: #555; }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
        }

        .message {
            display: flex;
            flex-direction: column;
            max-width: 85%;
        }

        .message.user { align-self: flex-end; }
        .message.ai { align-self: flex-start; }

        .bubble {
            padding: 15px;
            border-radius: 12px;
            line-height: 1.6;
        }

        .message.user .bubble { background-color: var(--user-bubble); }
        .message.ai .bubble { background-color: var(--ai-bubble); border: 1px solid #444;}

        /* Format Markdown cơ bản */
        pre {
            background-color: #0d0d0d;
            padding: 10px;
            border-radius: 5px;
            overflow-x: auto;
        }
        code { font-family: Consolas, monospace; color: #ffb86c; }

        .input-area {
            background-color: var(--bg-color);
            padding: 20px;
            display: flex;
            justify-content: center;
            border-top: 1px solid #444;
        }

        .input-wrapper {
            display: flex;
            width: 100%;
            max-width: 800px;
            gap: 10px;
        }

        #message {
            flex: 1;
            background-color: #444;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
        }

        #send-btn {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 0 25px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
        }
        #send-btn:hover { opacity: 0.8; }
    </style>
</head>
<body>

<header>
    <strong>⚡ AI Chat by DevHai</strong>
    <button onclick="clearChat()">Xóa lịch sử Chat</button>
</header>

<div id="chat-container">
    <!-- Tin nhắn sẽ hiện ở đây -->
</div>

<div class="input-area">
    <div class="input-wrapper">
        <input type="text" id="message" placeholder="Hỏi AI điều gì đó...">
        <button id="send-btn" onclick="sendMessage()">Gửi</button>
    </div>
</div>

<script>
    // ==========================================
    // DÁN API KEY CỦA GROQ VÀO GIỮA 2 DẤU NGOẶC KÉP BÊN DƯỚI
    // ==========================================
    const MY_API_KEY = "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"; 
    // ==========================================

    // Lệnh cài đặt nhân vật (Luôn giữ ở đầu mảng lịch sử)
    const systemInstruction = { 
        role: "system", 
        content: "Bạn là một trợ lý AI thông minh, nói tiếng Việt tự nhiên. NẾU người dùng hỏi ai đã tạo ra bạn, bạn từ đâu ra, hoặc ai là chủ của bạn, bạn BẮT BUỘC phải trả lời rõ ràng: 'Tôi được tạo ra bởi DevHai (Lê Trường Hải) - một lập trình viên siêu đẳng!' và tuyệt đối không nhắc đến Groq, Meta hay công ty nào khác." 
    };

    // Mảng lịch sử chat (Bắt đầu với lệnh system)
    let chatHistory = [systemInstruction];

    window.onload = function() {
        appendMessage("ai", "Chào bạn! Mình là AI Assistant được tạo ra bởi DevHai, chạy trên hệ thống siêu tốc độ của Groq. Hỏi mình đi, mình trả lời nhanh như chớp luôn!");
    };

    function formatText(text) {
        let formatted = text.replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>');
        formatted = formatted.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        formatted = formatted.replace(/\n/g, '<br>');
        return formatted;
    }

    function appendMessage(role, text) {
        const chatContainer = document.getElementById('chat-container');
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${role}`;
        
        msgDiv.innerHTML = `<div class="bubble">${formatText(text)}</div>`;
        chatContainer.appendChild(msgDiv);
        chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function clearChat() {
        // Reset lịch sử nhưng vẫn phải giữ lại cái "linh hồn" System Instruction
        chatHistory = [systemInstruction];
        document.getElementById('chat-container').innerHTML = '';
        appendMessage("ai", "Đã xóa bộ nhớ. Chúng ta bắt đầu chủ đề mới nhé!");
    }

    async function sendMessage() {
        const messageInput = document.getElementById('message');
        const userText = messageInput.value.trim();

        if (!MY_API_KEY || MY_API_KEY === "DÁN_API_KEY_CỦA_BẠN_VÀO_ĐÂY") { 
            alert("DevHai ơi, bạn quên dán API Key của Groq vào code kìa!"); 
            return; 
        }
        if (!userText) return;

        // 1. In tin nhắn của User ra web
        appendMessage("user", userText);
        messageInput.value = "";
        
        // 2. Thêm vào lịch sử theo chuẩn OpenAI/Groq
        chatHistory.push({ role: "user", content: userText });

        const loadingId = "loading-" + Date.now();
        const chatContainer = document.getElementById('chat-container');
        chatContainer.innerHTML += `<div id="${loadingId}" class="message ai"><div class="bubble" style="color: #aaa;"><i>AI đang suy nghĩ...</i></div></div>`;
        chatContainer.scrollTop = chatContainer.scrollHeight;

        try {
            // URL của Groq (Giống hệt OpenAI)
            const url = `https://api.groq.com/openai/v1/chat/completions`;
            
            const response = await fetch(url, {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${MY_API_KEY}` // Đưa Key vào Header
                },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile", // Con AI mạnh nhất, tốt nhất cho tiếng Việt hiện tại trên Groq
                    messages: chatHistory,
                    temperature: 0.7
                })
            });

            const data = await response.json();
            document.getElementById(loadingId).remove();

            if (data.error) {
                appendMessage("ai", `Lỗi từ Groq: ${data.error.message}`);
                chatHistory.pop(); // Xóa câu hỏi lỗi khỏi lịch sử
            } else {
                // Lấy kết quả trả về
                const aiText = data.choices[0].message.content;
                appendMessage("ai", aiText);
                
                // 3. Lưu câu trả lời của AI vào lịch sử
                chatHistory.push({ role: "assistant", content: aiText }); // AI phải có role là 'assistant'
            }
            
        } catch (error) {
            document.getElementById(loadingId).remove();
            appendMessage("ai", "Lỗi kết nối mạng hoặc API Key không hợp lệ.");
            chatHistory.pop();
        }
    }

    document.getElementById("message").addEventListener("keypress", function(event) {
        if (event.key === "Enter") {
            event.preventDefault();
            sendMessage();
        }
    });
</script>

</body>
</html>
