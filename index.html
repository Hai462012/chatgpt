<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat - Demo</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="dark-theme">
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar glass">
            <div class="sidebar-header">
                <h2 class="neon-text">DEVHAI AI</h2>
                <button id="new-chat-btn" class="btn-primary ripple">+ New Chat</button>
            </div>
            <div class="search-box">
                <input type="text" id="search-chat" placeholder="Tìm kiếm đoạn chat...">
            </div>
            <ul id="chat-list" class="custom-scrollbar"></ul>
            <div class="sidebar-footer">
                <div class="user-profile" id="user-profile-btn">
                    <img id="user-avatar" src="https://api.dicebear.com/7.x/avataaars/svg?seed=Dev" alt="Avatar">
                    <span id="username-display">User</span>
                </div>
                <button id="theme-toggle" class="icon-btn">🌓</button>
                <a href="admin.html" class="icon-btn" id="admin-link" style="display:none;">⚙️</a>
                <button id="logout-btn" class="icon-btn">🚪</button>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-area">
            <header class="chat-header glass">
                <h3 id="current-chat-title">Cuộc trò chuyện mới</h3>
                <div class="header-actions">
                    <button class="icon-btn" id="clear-current-chat">🗑️</button>
                </div>
            </header>
            <div id="chat-box" class="custom-scrollbar">
                <div class="welcome-screen">
                    <h1 class="neon-text">How can I help you today?</h1>
                </div>
            </div>
            <div class="input-container glass">
                <textarea id="chat-input" placeholder="Nhập tin nhắn... (Hỗ trợ Markdown)" rows="1"></textarea>
                <button id="send-btn" class="glow-btn">➤</button>
            </div>
        </main>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="glass hidden"></div>

    <script src="js/storage.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/chat.js"></script>
</body>
</html>
