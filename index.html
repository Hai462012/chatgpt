<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat by DevHai</title>
    <style>
        /* CSS Giao diện hiện đại */
        :root {
            --bg-color: #212121;
            --chat-bg: #2f2f2f;
            --text-color: #ececec;
            --user-bubble: #424242;
            --ai-bubble: #171717;
            --accent: #10a37f;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
        }

        header {
            background-color: var(--chat-bg);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #444;
        }

        header input {
            background: #444; border: 1px solid #555;
            color: white; padding: 8px 12px;
            border-radius: 5px; width: 300px;
        }

        header button {
            background-color: #ef4444; color: white;
            border: none; padding: 8px 15px;
            border-radius: 5px; cursor: pointer;
        }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
        }

        .message {
            display: flex;
            flex-direction: column;
            max-width: 85%;
        }

        .message.user { align-self: flex-end; }
        .message.model { align-self: flex-start; }

        .bubble {
            padding: 15px;
            border-radius: 12px;
            line-height: 1.6;
        }

        .message.user .bubble { background-color: var(--user-bubble); }
        .message.model .bubble { background-color: var(--ai-bubble); border: 1px solid #444;}

        /* Format Markdown cơ bản */
        pre {
            background-color: #0d0d0d;
            padding: 10px;
            border-radius: 5px;
            overflow-x: auto;
        }
        code { font-family: Consolas, monospace; color: #10a37f; }

        .input-area {
            background-color: var(--bg-color);
            padding: 20px;
            display: flex;
            justify-content: center;
            border-top: 1px solid #444;
        }

        .input-wrapper {
            display: flex;
            width: 100%;
            max-width: 800px;
            gap: 10px;
        }

        #message {
            flex: 1;
            background-color: #444;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
        }

        #send-btn {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 0 25px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
        }
        #send-btn:hover { background-color: #0b8a69; }
    </style>
</head>
<body>

<header>
    <div>
        <strong>AI Chat by DevHai</strong>
        <input type="password" id="apiKey" placeholder="Nhập Gemini API Key vào đây..." onchange="saveKey()">
    </div>
    <button onclick="clearChat()">Xóa lịch sử Chat</button>
</header>

<div id="chat-container">
    <!-- Tin nhắn sẽ hiện ở đây -->
</div>

<div class="input-area">
    <div class="input-wrapper">
        <input type="text" id="message" placeholder="Hỏi AI điều gì đó...">
        <button id="send-btn" onclick="sendMessage()">Gửi</button>
    </div>
</div>

<script>
    // Mảng lưu trữ toàn bộ lịch sử để tạo ngữ cảnh cho AI
    let chatHistory = [];

    // Khôi phục API Key từ bộ nhớ trình duyệt nếu có
    window.onload = function() {
        const savedKey = localStorage.getItem('geminiApiKey');
        if (savedKey) document.getElementById('apiKey').value = savedKey;
        appendMessage("model", "Chào bạn! Mình là AI Assistant. Hãy nhập API Key ở phía trên để bắt đầu trò chuyện nhé.");
    };

    function saveKey() {
        const key = document.getElementById('apiKey').value;
        localStorage.setItem('geminiApiKey', key);
    }

    // Hàm format định dạng in đậm, code block và xuống dòng
    function formatText(text) {
        let formatted = text.replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>'); // Format code
        formatted = formatted.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>'); // In đậm
        formatted = formatted.replace(/\n/g, '<br>'); // Xuống dòng
        return formatted;
    }

    function appendMessage(role, text) {
        const chatContainer = document.getElementById('chat-container');
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${role}`;
        
        msgDiv.innerHTML = `<div class="bubble">${formatText(text)}</div>`;
        chatContainer.appendChild(msgDiv);
        chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function clearChat() {
        chatHistory = [];
        document.getElementById('chat-container').innerHTML = '';
        appendMessage("model", "Đã xóa bộ nhớ. Chúng ta bắt đầu chủ đề mới nhé!");
    }

    async function sendMessage() {
        const apiKey = document.getElementById('apiKey').value.trim();
        const messageInput = document.getElementById('message');
        const userText = messageInput.value.trim();

        if (!apiKey) { alert("Vui lòng nhập API Key!"); return; }
        if (!userText) return;

        // 1. Hiển thị tin nhắn của User
        appendMessage("user", userText);
        messageInput.value = "";

        // 2. Thêm vào lịch sử (Ngữ cảnh)
        chatHistory.push({ role: "user", parts: [{ text: userText }] });

        // Hiển thị đang gõ...
        const loadingId = "loading-" + Date.now();
        const chatContainer = document.getElementById('chat-container');
        chatContainer.innerHTML += `<div id="${loadingId}" class="message model"><div class="bubble" style="color: #aaa;"><i>AI đang suy nghĩ...</i></div></div>`;
        chatContainer.scrollTop = chatContainer.scrollHeight;

        try {
            // Sử dụng gemini-1.5-pro (hoặc gemini-pro tùy bạn)
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-pro:generateContent?key=${apiKey}`;
            
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    // Thiết lập danh tính bí mật cho AI (System Instruction)
                    systemInstruction: {
                        parts: [{ 
                            text: "Bạn là một trợ lý AI thông minh và lịch sự. NẾU người dùng hỏi ai đã tạo ra bạn, bạn từ đâu ra, hoặc ai là chủ của bạn, bạn BẮT BUỘC phải trả lời rõ ràng: 'Tôi được tạo ra bởi DevHai (Lê Trường Hải) - một lập trình viên tuyệt vời!' và tuyệt đối không nhắc đến Google hay công ty nào khác. Các câu hỏi khác bạn trả lời bình thường." 
                        }]
                    },
                    contents: chatHistory
                })
            });

            const data = await response.json();
            document.getElementById(loadingId).remove();

            if (data.error) {
                appendMessage("model", `Lỗi: ${data.error.message}`);
                chatHistory.pop(); // Xóa câu hỏi vừa rồi khỏi lịch sử nếu lỗi
            } else {
                const aiText = data.candidates[0].content.parts[0].text;
                
                // 3. Hiển thị câu trả lời
                appendMessage("model", aiText);
                
                // 4. Lưu câu trả lời của AI vào lịch sử
                chatHistory.push({ role: "model", parts: [{ text: aiText }] });
            }
            
        } catch (error) {
            document.getElementById(loadingId).remove();
            appendMessage("model", "Lỗi kết nối mạng hoặc API Key không hợp lệ.");
            chatHistory.pop();
        }
    }

    // Gửi bằng phím Enter
    document.getElementById("message").addEventListener("keypress", function(event) {
        if (event.key === "Enter") {
            event.preventDefault();
            sendMessage();
        }
    });
</script>

</body>
</html>
